<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ऑफ़लाइन — Utkal Brahmin Samaj</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #fff8e1, #fffde7);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 24px;
    }
    .card {
      background: white; border-radius: 24px;
      padding: 48px 36px; max-width: 420px; width: 100%;
      box-shadow: 0 20px 60px rgba(217,119,6,0.12);
      border: 1px solid #fde68a;
    }
    .icon { font-size: 56px; margin-bottom: 20px; color: #d97706; }
    h1 { font-size: 24px; font-weight: 800; color: #1f2937; margin-bottom: 10px; }
    p { font-size: 14px; color: #6b7280; line-height: 1.8; margin-bottom: 24px; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: #d97706; color: white;
      padding: 12px 28px; border-radius: 50px;
      font-weight: 700; text-decoration: none; font-size: 14px;
      transition: all 0.2s; border: none; cursor: pointer;
    }
    .btn:hover { background: #b45309; transform: translateY(-2px); }
    .symbol { font-size: 40px; margin-bottom: 16px; display: block; }
  </style>
</head>
<body>
  <div class="card">
    <span class="symbol">ଓ</span>
    <div class="icon"><i class="fas fa-wifi-slash"></i></div>
    <h1>इंटरनेट कनेक्शन नहीं है</h1>
    <p>
      जय जगन्नाथ! 🙏<br><br>
      लगता है आप अभी ऑफ़लाइन हैं।<br>
      कृपया अपना इंटरनेट कनेक्शन जाँचें और दोबारा प्रयास करें।<br><br>
      <em>Please check your internet connection and try again.</em>
    </p>
    <button class="btn" onclick="location.reload()">
      <i class="fas fa-redo"></i> फिर से कोशिश करें (Retry)
    </button>
  </div>
</body>
</html>
